name: CI/CD — Kripanidhi Legal Tracking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:      # allow manual runs from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/kl-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/kl-frontend

# ──────────────────────────────────────────────────────────────────
# Job 1: Lint + Basic health check
# ──────────────────────────────────────────────────────────────────
jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint --if-present
        working-directory: backend

      - name: Lint frontend
        run: npm run lint --if-present
        working-directory: frontend

      - name: Type-check frontend
        run: npm run type-check --if-present
        working-directory: frontend

      - name: Backend smoke test (require + syntax check)
        run: node --check server.js
        working-directory: backend
        env:
          NODE_ENV: test

# ──────────────────────────────────────────────────────────────────
# Job 2: Build & push Docker images (only on push to main)
# ──────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.version }}
      frontend_tag: ${{ steps.meta-frontend.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ──────────────────────────────────────────────────────────────────
# Job 3: Deploy to production server via SSH
# ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production       # requires manual approval in GitHub Environments
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -e

            echo "=== Deploying Kripanidhi Legal ==="
            cd /opt/kripanidhi

            # Save current image tags for potential rollback
            echo "${{ needs.build-push.outputs.backend_tag }}" > .last_backend_tag
            echo "${{ needs.build-push.outputs.frontend_tag }}" > .last_frontend_tag

            # Pull new images
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest

            # Zero-downtime restart via compose
            docker compose pull
            docker compose up -d --remove-orphans

            # Wait for health checks to pass
            sleep 15
            docker compose ps

            echo "=== Deploy complete ==="

# ──────────────────────────────────────────────────────────────────
# Job 4: Rollback (manual trigger only)
# Re-deploys the previous image tag saved during the last deploy
# ──────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -e

            echo "=== Rolling back Kripanidhi Legal ==="
            cd /opt/kripanidhi

            # Read saved previous tags
            PREV_BACKEND=$(cat .last_backend_tag 2>/dev/null || echo "latest")
            PREV_FRONTEND=$(cat .last_frontend_tag 2>/dev/null || echo "latest")

            echo "Rolling back backend to: sha-$PREV_BACKEND"
            echo "Rolling back frontend to: sha-$PREV_FRONTEND"

            # Override compose images with pinned SHA tags
            BACKEND_IMAGE=${{ env.IMAGE_BACKEND }}:sha-${PREV_BACKEND} \
            FRONTEND_IMAGE=${{ env.IMAGE_FRONTEND }}:sha-${PREV_FRONTEND} \
            docker compose up -d --remove-orphans

            echo "=== Rollback complete ==="
